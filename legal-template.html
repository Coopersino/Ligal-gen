<!-- template:legal-row:start -->
<tr>
  <td align="left" valign="bottom"
    style="padding: 0 30px; font-family:Helvetica, Arial sans-serif; font-size:12px; line-height:14px; color:#7D838A; font-weight:400;">
    {{footnote}}{{content}}
    <br><br>
  </td>
</tr>
<!-- template:legal-row:end -->

<!-- template:address-part:start -->
<a class="link" border="0"
  style="margin:0;text-decoration:none;font-family:Helvetica,Arial,sans-serif;white-space:nowrap;color:#7D838A;">{{content}}</a>
<!-- template:address-part:end -->

<!-- template:legal-link:start -->
<a href="{{href}}" style="border-bottom: 1px solid #d1d1d1; margin: 0; text-decoration: none; color: #7D838A; font-family: Helvetica, Arial, sans-serif; white-space: nowrap;" target="_blank">{{content}}</a>
<!-- template:legal-link:end -->
